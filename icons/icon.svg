<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7b9aff"/>
      <stop offset="100%" stop-color="#3a56d4"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Calendar body (dark, so grid lines show) -->
  <rect x="95" y="130" width="322" height="290" rx="18" fill="#1e2a4a" opacity="0.7"/>

  <!-- Calendar top bar -->
  <rect x="95" y="130" width="322" height="55" rx="18" fill="#fff" opacity="0.15"/>
  <rect x="95" y="157" width="322" height="28" fill="#fff" opacity="0.15"/>

  <!-- Rings -->
  <rect x="170" y="116" width="14" height="36" rx="7" fill="#fff" opacity="0.8"/>
  <rect x="250" y="116" width="14" height="36" rx="7" fill="#fff" opacity="0.8"/>
  <rect x="330" y="116" width="14" height="36" rx="7" fill="#fff" opacity="0.8"/>

  <!-- Grid lines (light on dark) -->
  <g stroke="#fff" stroke-opacity="0.25" stroke-width="1.5">
    <line x1="159" y1="185" x2="159" y2="420"/>
    <line x1="223" y1="185" x2="223" y2="420"/>
    <line x1="287" y1="185" x2="287" y2="420"/>
    <line x1="351" y1="185" x2="351" y2="420"/>
    <line x1="95" y1="185" x2="417" y2="185"/>
    <line x1="95" y1="241" x2="417" y2="241"/>
    <line x1="95" y1="297" x2="417" y2="297"/>
    <line x1="95" y1="353" x2="417" y2="353"/>
  </g>

  <!-- DUEIT letters in first grid row -->
  <text font-family="sans-serif" font-weight="800" font-size="34" fill="#fff" opacity="0.9" text-anchor="middle">
    <tspan x="127" y="222">D</tspan>
    <tspan x="191" y="222">U</tspan>
    <tspan x="255" y="222">E</tspan>
    <tspan x="319" y="222">I</tspan>
    <tspan x="384" y="222">T</tspan>
  </text>

  <!-- Hand-drawn stars (stroked, slightly wobbly paths, varied sizes, off-center in cells) -->
  <!-- Row 2, col 1 — tiny -->
  <g transform="translate(132,262) rotate(5) scale(0.32)">
    <path d="M0,-24 L8,-9 L25,-8 L13,3 L17,20 L0,12 L-16,21 L-12,3 L-24,-9 L-7,-8 Z"
          fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>
  </g>
  <!-- Row 2, col 3 — large, slightly off-center -->
  <g transform="translate(260,274) rotate(-6) scale(0.7)">
    <path d="M0,-24 L5,-6 L22,-8 L10,5 L14,23 L0,13 L-13,22 L-9,5 L-21,-7 L-4,-7 Z"
          fill="none" stroke="#fff" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>
  </g>
  <!-- Row 3, col 2 — medium, rotated -->
  <g transform="translate(185,330) rotate(15) scale(0.48)">
    <path d="M0,-24 L7,-9 L24,-7 L12,4 L15,20 L0,11 L-14,21 L-11,5 L-23,-8 L-6,-8 Z"
          fill="none" stroke="#fff" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
  </g>
  <!-- Row 3, col 4 — small -->
  <g transform="translate(322,338) rotate(-20) scale(0.38)">
    <path d="M0,-24 L6,-8 L22,-9 L11,3 L16,21 L0,12 L-15,22 L-10,3 L-21,-8 L-5,-9 Z"
          fill="none" stroke="#fff" stroke-width="3.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>
  </g>
  <!-- Row 4, col 1 — tiny -->
  <g transform="translate(122,380) rotate(10) scale(0.3)">
    <path d="M0,-24 L7,-8 L23,-9 L12,4 L16,21 L0,12 L-15,22 L-11,4 L-22,-8 L-6,-9 Z"
          fill="none" stroke="#fff" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round" opacity="0.75"/>
  </g>
  <!-- Row 4, col 5 — medium-large -->
  <g transform="translate(378,388) rotate(-8) scale(0.58)">
    <path d="M0,-24 L5,-7 L21,-8 L10,4 L14,22 L0,13 L-13,21 L-9,4 L-20,-7 L-4,-8 Z"
          fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
