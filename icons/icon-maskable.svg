<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7b9aff"/>
      <stop offset="100%" stop-color="#3a56d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Calendar body (dark) -->
  <rect x="110" y="145" width="292" height="262" rx="16" fill="#1e2a4a" opacity="0.7"/>

  <!-- Calendar top bar -->
  <rect x="110" y="145" width="292" height="50" rx="16" fill="#fff" opacity="0.15"/>
  <rect x="110" y="170" width="292" height="25" fill="#fff" opacity="0.15"/>

  <!-- Rings -->
  <rect x="180" y="132" width="13" height="32" rx="6.5" fill="#fff" opacity="0.8"/>
  <rect x="250" y="132" width="13" height="32" rx="6.5" fill="#fff" opacity="0.8"/>
  <rect x="320" y="132" width="13" height="32" rx="6.5" fill="#fff" opacity="0.8"/>

  <!-- Grid lines -->
  <g stroke="#fff" stroke-opacity="0.25" stroke-width="1.3">
    <line x1="168" y1="195" x2="168" y2="407"/>
    <line x1="226" y1="195" x2="226" y2="407"/>
    <line x1="284" y1="195" x2="284" y2="407"/>
    <line x1="342" y1="195" x2="342" y2="407"/>
    <line x1="110" y1="195" x2="402" y2="195"/>
    <line x1="110" y1="248" x2="402" y2="248"/>
    <line x1="110" y1="301" x2="402" y2="301"/>
    <line x1="110" y1="354" x2="402" y2="354"/>
  </g>

  <!-- DUEIT letters in first grid row -->
  <text font-family="sans-serif" font-weight="800" font-size="30" fill="#fff" opacity="0.9" text-anchor="middle">
    <tspan x="139" y="230">D</tspan>
    <tspan x="197" y="230">U</tspan>
    <tspan x="255" y="230">E</tspan>
    <tspan x="313" y="230">I</tspan>
    <tspan x="372" y="230">T</tspan>
  </text>

  <!-- Hand-drawn stars -->
  <g transform="translate(143,268) rotate(5) scale(0.3)">
    <path d="M0,-24 L8,-9 L25,-8 L13,3 L17,20 L0,12 L-16,21 L-12,3 L-24,-9 L-7,-8 Z"
          fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>
  </g>
  <g transform="translate(258,278) rotate(-6) scale(0.65)">
    <path d="M0,-24 L5,-6 L22,-8 L10,5 L14,23 L0,13 L-13,22 L-9,5 L-21,-7 L-4,-7 Z"
          fill="none" stroke="#fff" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>
  </g>
  <g transform="translate(190,332) rotate(15) scale(0.44)">
    <path d="M0,-24 L7,-9 L24,-7 L12,4 L15,20 L0,11 L-14,21 L-11,5 L-23,-8 L-6,-8 Z"
          fill="none" stroke="#fff" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
  </g>
  <g transform="translate(318,340) rotate(-20) scale(0.35)">
    <path d="M0,-24 L6,-8 L22,-9 L11,3 L16,21 L0,12 L-15,22 L-10,3 L-21,-8 L-5,-9 Z"
          fill="none" stroke="#fff" stroke-width="3.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>
  </g>
  <g transform="translate(130,378) rotate(10) scale(0.28)">
    <path d="M0,-24 L7,-8 L23,-9 L12,4 L16,21 L0,12 L-15,22 L-11,4 L-22,-8 L-6,-9 Z"
          fill="none" stroke="#fff" stroke-width="4.2" stroke-linejoin="round" stroke-linecap="round" opacity="0.75"/>
  </g>
  <g transform="translate(365,385) rotate(-8) scale(0.52)">
    <path d="M0,-24 L5,-7 L21,-8 L10,4 L14,22 L0,13 L-13,21 L-9,4 L-20,-7 L-4,-8 Z"
          fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
